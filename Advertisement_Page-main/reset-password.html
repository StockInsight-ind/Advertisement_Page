<!DOCTYPE html>

<html>
<head>
  <title>Reset Password</title>

  <!-- ✅ FIXED favicon (correct filename) -->

  <link rel="icon" href="logo_white.png" type="image/png">
  <link rel="shortcut icon" href="logo_white.png" type="image/png">
</head>

<body style="background:#020617;color:white;font-family:sans-serif;text-align:center;padding-top:100px;">

<h2>Set New Password</h2>

<input type="password" id="newPassword" placeholder="New password" style="padding:10px;margin:10px;"><br>

<button id="updateBtn" style="padding:10px 20px;" disabled>
  Update Password
</button>

<p id="msg"></p>

<!-- Supabase -->

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPA_URL = "https://mnbmocinletzjsvmaaev.supabase.co";
const SUPA_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1uYm1vY2lubGV0empzdm1hYWV2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3MzYzNzEsImV4cCI6MjA5MTMxMjM3MX0.X_bbX8_ea3x8XkZiYQ7KOqBWBUklhf0-L5GW9Y0R6LA"; // keep your same key

// ✅ CRITICAL: initialize client
const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

const msg = document.getElementById("msg");
const updateBtn = document.getElementById("updateBtn");

// 🔥 Extract tokens (supports both ? and #)
function getTokensFromURL() {
  let params;

  if (window.location.hash) {
    params = new URLSearchParams(window.location.hash.substring(1));
  } else {
    params = new URLSearchParams(window.location.search);
  }

  return {
    access_token: params.get("access_token"),
    refresh_token: params.get("refresh_token")
  };
}

// 🔥 Init session
async function initSession() {
  const { data } = await sb.auth.getSession();

  if (data.session) {
    msg.innerText = "✅ Session active. Set new password.";
    updateBtn.disabled = false;
    return;
  }

  const { access_token, refresh_token } = getTokensFromURL();

  if (access_token && refresh_token) {
    const { error } = await sb.auth.setSession({
      access_token,
      refresh_token
    });

    if (error) {
      msg.innerText = "❌ Session restore failed: " + error.message;
      return;
    }

    msg.innerText = "✅ Session restored. Set new password.";
    updateBtn.disabled = false;
    return;
  }

  msg.innerText = "❌ Invalid or expired reset link.";
}

// 🔥 Update password
async function updatePassword() {
  const password = document.getElementById("newPassword").value;

  if (!password || password.length < 6) {
    msg.innerText = "❌ Password must be at least 6 characters";
    return;
  }

  const { error } = await sb.auth.updateUser({ password });

  if (error) {
    msg.innerText = "❌ " + error.message;
  } else {
    msg.innerText = "✅ Password updated! Redirecting...";
    setTimeout(() => window.location.href = "login.html", 1500);
  }
}

// ✅ Proper event binding
window.addEventListener("load", initSession);
updateBtn.addEventListener("click", updatePassword);

</script>

</body>
</html>
