<!DOCTYPE html>
<html>
<head>
  <title>Reset Password</title>
</head>
<body style="background:#020617;color:white;font-family:sans-serif;text-align:center;padding-top:100px;">

<h2>Set New Password</h2>

<input type="password" id="newPassword" placeholder="New password" style="padding:10px;margin:10px;"><br>
<button onclick="updatePassword()" style="padding:10px 20px;">Update Password</button>

<p id="msg"></p>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPA_URL = window.ENV.SUPABASE_URL;
const SUPA_KEY = window.ENV.SUPABASE_KEY;
const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

const msg = document.getElementById("msg");

// 🔥 UNIVERSAL TOKEN PARSER (handles BOTH ? and #)
function getTokensFromURL() {
  let params;

  if (window.location.hash) {
    params = new URLSearchParams(window.location.hash.substring(1));
  } else {
    params = new URLSearchParams(window.location.search);
  }

  return {
    access_token: params.get("access_token"),
    refresh_token: params.get("refresh_token")
  };
}

// 🔥 INIT SESSION
async function initSession() {
  const { access_token, refresh_token } = getTokensFromURL();

  if (access_token && refresh_token) {
    const { error } = await sb.auth.setSession({
      access_token,
      refresh_token
    });

    if (error) {
      msg.innerText = "❌ Session restore failed: " + error.message;
      return;
    }

    msg.innerText = "✅ Session restored. Set new password.";
    return;
  }

  msg.innerText = "❌ Invalid or expired reset link.";
}

initSession();

// 🔥 UPDATE PASSWORD
async function updatePassword() {
  const password = document.getElementById("newPassword").value;

  if (!password || password.length < 6) {
    msg.innerText = "❌ Password must be at least 6 characters";
    return;
  }

  const { error } = await sb.auth.updateUser({ password });

  if (error) {
    msg.innerText = "❌ " + error.message;
  } else {
    msg.innerText = "✅ Password updated!";
    setTimeout(() => window.location.href = "login.html", 1500);
  }
}
</script>

</body>
</html>
